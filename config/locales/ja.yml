      title: 声を上げて
      description: チケットに最初のコメントを投稿する
      quote: コミュニケーションが鍵。
    attach_a_picture_achievement:
      title: 「真実」はどこ？
      description: プロジェクトに画像を添付する
      quote: 画像なしの投稿は許されない。
