      title: 夜型人間
      description: 午後10時から午前5時の間にチケットを更新する
      quote: 最高のコードは深夜に書かれる。
    early_bird_achievement:
      title: 早起きは三文の得
      description: 期限前にチケットをクローズする
      quote: 早い者勝ち。
    long_haul_achievement:
      title: 長期戦
      description: 30日以上オープンだったチケットをクローズする
      quote: 継続は力なり。
    priority_expert_achievement:
      title: 優先度マスター
      description: 高優先度のチケットをクローズする
      quote: 大きな問題から片付ける。
    detailed_reporter_achievement:
      title: 詳細レポーター
      description: 200文字以上のコメントを投稿する
      quote: 神は細部に宿る。
    paperwork_achievement:
      title: 書類仕事
      description: 画像以外のファイルをアップロードする
      quote: ドキュメントは愛、ドキュメントは命。
    time_tracker_achievement:
      title: タイムキーパー
      description: 最初の作業時間を記録する
      quote: 時は金なり。
    self_assigned_achievement:
      title: 自発的
      description: チケットを自分に割り当てる
      quote: 自分でやるのが一番確実。
    weekend_warrior_achievement:
      title: 週末戦士
      description: 週末にチケットを更新する
      quote: 頑張る者に休みはない。
    multi_tracker_achievement:
      title: マルチトラッカー
      description: 3種類以上の異なるトラッカーでチケットを作成する
      quote: 何でもこなす、マルチプレイヤー。
