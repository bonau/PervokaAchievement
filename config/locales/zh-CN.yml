      title: 团队合作者
      description: 成为 3 个以上项目的成员
      quote: 团队中没有「我」。
    first_comment_achievement:
      title: 发声
      description: 在问题上发表你的第一条评论
      quote: 沟通是关键。
    attach_a_picture_achievement:
      title: 真相呢？
      description: 在一个项目中贴图
      quote: 发帖不附图，此风不可长。
