    first_love_achievement:
      title: First Love
      description: Assigned to at least one issue
      quote: First time's always painful.
    close_project_achievement:
      title: Stop-Loss Point
      description: Close a project
      quote: It's better to be *closed*.
    it_must_be_kidding_achievement:
      title: It MUST Be Kidding
      description: Reopen a project
      quote: Else I will find you, and I will kill you.
    resolve_first_issue_achievement:
      title: Problem Solver
      description: Resolve your first issue
      quote: One down, infinity to go.
    create_first_issue_achievement:
      title: Hello World
      description: Create your first issue
      quote: Every journey begins with a single step.
    speed_runner_achievement:
      title: Speed Runner
      description: Close an issue within 24 hours of its creation
      quote: Fast and furious.
    bug_hunter_achievement:
      title: Bug Hunter
      description: Report your first bug
      quote: "It's not a bug, it's a feature... wait, no, it's a bug."
    wiki_editor_achievement:
      title: Knowledge Keeper
      description: Edit a wiki page for the first time
      quote: Knowledge shared is knowledge squared.
    team_player_achievement:
      title: Team Player
      description: Be a member of 3 or more projects
      quote: "There is no 'I' in 'team'."
    first_comment_achievement:
      title: Voice Heard
      description: Post your first comment on an issue
      quote: Communication is key.
    attach_a_picture_achievement:
      title: Where's The "Truth"?
      description: Attach an image in a project
      quote: It's no good to post without a pic.
    night_owl_achievement:
      title: Night Owl
      description: Update an issue between 10 PM and 5 AM
      quote: The best code is written after midnight.
    early_bird_achievement:
      title: Early Bird
      description: Close an issue before its due date
      quote: The early bird catches the worm.
    long_haul_achievement:
      title: Long Haul
      description: Close an issue that was open for 30+ days
      quote: Persistence pays off in the end.
    priority_expert_achievement:
      title: Priority Expert
      description: Close a high-priority issue
      quote: Tackling the big ones first.
    detailed_reporter_achievement:
      title: Detailed Reporter
      description: Write a comment with 200+ characters
      quote: The devil is in the details.
    paperwork_achievement:
      title: Paperwork
      description: Upload a non-image file
      quote: Documentation is love, documentation is life.
    time_tracker_achievement:
      title: Time Keeper
      description: Log your first time entry
      quote: Time is money, friend.
    self_assigned_achievement:
      title: Self Starter
      description: Assign an issue to yourself
      quote: If you want something done right, do it yourself.
    weekend_warrior_achievement:
      title: Weekend Warrior
      description: Update an issue on a weekend
      quote: No rest for the wicked.
    multi_tracker_achievement:
      title: Multi-tracker
      description: Create issues in 3 or more different trackers
      quote: Jack of all trades, master of... some.
