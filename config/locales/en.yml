  achievement:
    unlocked: Achievement "%{title}" Unlocked!
    detail: An achievement is unlocked. More functions will be available in the future.
    list_caption: Achievements
    view_list: View all achievements.
    category:
      issue: Issues
      project: Projects
      wiki: Wiki
      social: Social
