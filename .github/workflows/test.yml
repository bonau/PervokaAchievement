name: Plugin Tests

on:
  push:
    branches: [ master, develop, 'release/**', 'claude/**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    name: "Redmine ${{ matrix.redmine }} / Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - redmine: "5.1-stable"
            ruby: "3.1"
          - redmine: "6.0-stable"
            ruby: "3.2"
          - redmine: "6.0-stable"
            ruby: "3.3"

    env:
      RAILS_ENV: test

    steps:
      - name: Checkout Redmine
        uses: actions/checkout@v4
        with:
          repository: redmine/redmine
          ref: ${{ matrix.redmine }}
          path: redmine

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: redmine/plugins/pervoka_achievement

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Configure database
        working-directory: redmine
        run: |
          cat > config/database.yml <<'DBEOF'
          test:
            adapter: sqlite3
            database: db/test.sqlite3
          DBEOF
          sed -i 's/^          //' config/database.yml

      - name: Install Ruby dependencies
        working-directory: redmine
        run: |
          gem install bundler
          bundle config set --local without 'development'
          bundle install --jobs=4 --retry=3

      - name: Generate secret token
        working-directory: redmine
        run: bundle exec rake generate_secret_token

      - name: Run Redmine migrations
        working-directory: redmine
        run: bundle exec rake db:migrate

      - name: Load default data
        working-directory: redmine
        run: bundle exec rake redmine:load_default_data REDMINE_LANG=en

      - name: Run plugin migrations
        working-directory: redmine
        run: bundle exec rake redmine:plugins:migrate NAME=pervoka_achievement

      - name: Run unit tests
        working-directory: redmine
        run: bundle exec rake redmine:plugins:test:units NAME=pervoka_achievement

      - name: Run functional tests
        working-directory: redmine
        run: bundle exec rake redmine:plugins:test:functionals NAME=pervoka_achievement

  lint:
    name: "Ruby Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Check Ruby syntax
        run: |
          echo "=== Checking Ruby syntax ==="
          find app lib -name "*.rb" -exec ruby -c {} \;
          echo ""
          echo "=== Checking test syntax ==="
          find test -name "*.rb" -exec ruby -c {} \;

      - name: Check YAML syntax
        run: |
          echo "=== Checking locale files ==="
          ruby -e "
            require 'yaml'
            Dir['config/locales/*.yml'].each do |f|
              begin
                YAML.load_file(f)
                puts \"OK: #{f}\"
              rescue => e
                puts \"ERROR: #{f}: #{e.message}\"
                exit 1
              end
            end
          "
