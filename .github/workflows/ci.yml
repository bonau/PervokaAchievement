name: CI

on:
  push:
    branches: [ develop, master, main ]
  pull_request:
    branches: [ develop, master, main ]

jobs:
  test:
    name: RSpec Tests (Ruby ${{ matrix.ruby }} / Redmine ${{ matrix.redmine }})
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.1', '3.2', '3.3']
        redmine: ['5.1', '6.1']
        exclude:
          - ruby: '3.1'
            redmine: '6.1'
          - ruby: '3.3'
            redmine: '5.1'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: redmine
          POSTGRES_PASSWORD: redmine
          POSTGRES_DB: redmine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      REDMINE_VERSION: ${{ matrix.redmine }}-stable
      
    steps:
      - name: Checkout Redmine
        uses: actions/checkout@v6
        with:
          repository: redmine/redmine
          ref: ${{ matrix.redmine }}-stable
          path: redmine

      - name: Checkout Plugin
        uses: actions/checkout@v6
        with:
          path: redmine/plugins/pervoka_achievement

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: false

      - name: Setup Database Config
        run: |
          cd redmine
          cp config/database.yml.example config/database.yml
          cat > config/database.yml << EOF
          test:
            adapter: postgresql
            database: redmine_test
            host: localhost
            username: redmine
            password: redmine
            encoding: utf8
          EOF

      - name: Install Dependencies
        run: |
          cd redmine
          echo "gem 'rspec-rails', '~> 6.0', group: [:development, :test]" >> Gemfile.local
          echo "gem 'rspec_junit_formatter', group: [:test]" >> Gemfile.local
          echo "gem 'rails-controller-testing', group: [:test]" >> Gemfile.local
          bundle config set --local without 'development'
          bundle install --jobs 4 --retry 3

      - name: Generate Secret Token
        run: |
          cd redmine
          bundle exec rake generate_secret_token

      - name: Setup Database
        run: |
          cd redmine
          bundle exec rake db:create db:migrate
          bundle exec rake redmine:plugins:migrate NAME=pervoka_achievement

      - name: Run RSpec Tests
        run: |
          cd redmine/plugins/pervoka_achievement
          bundle exec rspec spec --format documentation --format RspecJunitFormatter --out ../../tmp/rspec-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: rspec-results-ruby${{ matrix.ruby }}-redmine${{ matrix.redmine }}
          path: redmine/tmp/rspec-results.xml

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check Ruby Syntax
        run: |
          echo "Checking Ruby syntax..."
          find . -name "*.rb" -not -path "./vendor/*" -exec ruby -c {} \; | grep -v "Syntax OK" && exit 1 || echo "All Ruby files have valid syntax"

      - name: Check for Common Issues
        run: |
          echo "Checking for common issues..."
          # Check for debugger statements
          if grep -r "binding.pry\|debugger\|byebug" --include="*.rb" .; then
            echo "Found debugger statements in code"
            exit 1
          fi
          echo "No debugger statements found"

  lint:
    name: RuboCop
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install RuboCop
        run: |
          gem install rubocop
          gem install rubocop-rails
          gem install rubocop-rspec

      - name: Run RuboCop
        run: |
          rubocop --format github
        continue-on-error: true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Plugin
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: pervoka-achievement:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image
        run: |
          docker compose version
          echo "Docker image built successfully"
